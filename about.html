<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Mblue Game</title>
    <link rel="preconnect" href="https://googleapis.com"><link rel="preconnect" href="https://gstatic.com" crossorigin><link href="https://googleapis.com/css2?family=Orbitron:wght@500;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #050814; --bg-surface: rgba(13, 20, 41, 0.6); --neon-cyan: #00f0ff; --text-pure: #ffffff; --text-body: #a0aec0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-pure); line-height: 1.7; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #1e0b36 0%, transparent 50%); z-index: -1; }
        header { background: rgba(5, 8, 20, 0.85); backdrop-filter: blur(12px); padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 800; color: var(--text-pure); }
        .logo span { color: var(--neon-cyan); }
        .nav-container { display: flex; align-items: center; gap: 30px; }
        nav a { color: var(--text-body); text-decoration: none; font-weight: 600; font-size: 14px; text-transform: uppercase; }
        nav a:hover, nav a.active { color: var(--neon-cyan); }
        .lang-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,240,255,0.15); color: var(--neon-cyan); padding: 6px 14px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 13px; font-family: 'Orbitron', sans-serif; }
        .lang-btn:hover { background: var(--neon-cyan); color: #000; }
        section { padding: 80px 8%; max-width: 1000px; margin: 0 auto; }
        .section-title { font-family: 'Orbitron', sans-serif; font-size: 36px; text-align: center; margin-bottom: 40px; }
        .section-title span { color: var(--neon-cyan); }
        .content-block { background: var(--bg-surface); backdrop-filter: blur(16px); padding: 45px; border-radius: 20px; border: 1px solid rgba(0, 240, 255, 0.15); }
        h3 { font-family: 'Orbitron', sans-serif; color: var(--neon-cyan); margin-top: 30px; margin-bottom: 12px; font-size: 20px; }
        h3:first-of-type { margin-top: 0; }
        p { color: var(--text-body); font-size: 15px; margin-bottom: 25px; text-align: justify; }
        footer { background: #02040a; text-align: center; padding: 40px; font-size: 13px; color: var(--text-body); margin-top: 100px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">MBLUE<span>GAME</span></div>
        <div class="nav-container">
            <nav><a href="index.html" id="nav-home">Home</a><a href="about.html" class="active" id="nav-about">About</a><a href="privacy.html" id="nav-privacy">Privacy</a></nav>
            <button class="lang-btn" onclick="toggleLanguage()">TR</button>
        </div>
    </header>
    <section>
        <h2 class="section-title"><span id="title-main">Studio Profile</span></h2>
        <div class="content-block" id="content"></div>
    </section>
    <footer><p>© 2024 <span>Mblue Game - Onur Uslu</span>. <span id="footer-text">All rights reserved.</span></p></footer>

    <script>
        const translations = {
            en: {
                navHome: "Home", navAbout: "About", navPrivacy: "Privacy", btn: "TR", title: "Studio Profile", foot: "All rights reserved.",
                html: `<h3>Who We Are</h3><p>MBlueGame Applications is a premier mobile game development studio dedicated to crafting engaging and innovative digital experiences for a global audience. Led by founder and lead developer Onur Uslu, our studio is built on a foundation of technical excellence and a deep-seated passion for the interactive entertainment industry. We specialize in delivering high-fidelity graphics, seamless gameplay mechanics, and intuitive, user-centric designs.</p><h3>Our Mission</h3><p>Our mission is to redefine mobile entertainment by developing titles that transcend traditional gaming. From intense arcade challenges to immersive strategic adventures, MBlueGame Applications is committed to uncompromising quality in every pixel. We strive to create lasting impressions through rewarding gameplay and consistent innovation.</p><h3>Global Distribution</h3><p>We combine advanced technical expertise with boundless artistic creativity to bring unique concepts to life. Our portfolio is proudly featured across major global mobile ecosystems, including Google Play Store, Amazon Appstore, and Palm Store (Transsion). We are constantly evolving to lead and expand our presence in the international gaming market.</p><h3>Legal Ownership</h3><p>MBlueGame Applications is a professional development studio. All operations, intellectual properties, and digital assets are exclusively owned and managed by Onur Uslu.</p>`
            },
            tr: {
                navHome: "Ana Sayfa", navAbout: "Hakkımızda", navPrivacy: "Gizlilik", btn: "EN", title: "Stüdyo Profili", foot: "Tüm hakları saklıdır.",
                html: `<h3>Biz Kimiz?</h3><p>MBlueGame Uygulamaları, küresel bir kitle için ilgi çekici ve yenilikçi dijital deneyimler üretmeye adanmış lider bir mobil oyun geliştirme stüdyosudur. Kurucumuz ve baş geliştiricimiz Onur Uslu liderliğindeki stüdyomuz, teknik mükemmellik ve interaktif eğlence sektörüne duyulan derin bir tutku üzerine kurulmuştur. Yüksek kaliteli grafikler, kusursuz oynanış mekanikleri ve sezgisel, kullanıcı odaklı tasarımlar sağlama konusunda uzmanız.</p><h3>Misyonumuz</h3><p>Misyonumuz, geleneksel oyunların ötesine geçen yapımlar geliştirerek mobil eğlenceyi yeniden tanımlamaktır. Yoğun arcade mücadelelerinden sürükleyici stratejik maceralara kadar, MBlueGame Uygulamaları her pikselde tavizsiz bir kaliteye kendini adamıştır. Ödüllendirici oynanış ve istikrarlı yenilikçilik sayesinde kalıcı izlenimler yaratmaya çalışıyoruz.</p><h3>Küresel Dağıtım</h3><p>Benzersiz konseptleri hayata geçirmek için gelişmiş teknik uzmanlığı sınırsız sanatsal yaratıcılıkla birleştiriyoruz. Portföyümüz, Google Play Store, Amazon Appstore ve Palm Store (Transsion) dahil olmak üzere büyük küresel mobil ekosistemlerde gururla yer almaktadır. Uluslararası oyun pazarındaki varlığımızı yönetmek ve genişletmek için sürekli olarak gelişiyoruz.</p><h3>Yasal Sorumluluk ve Mülkiyet</h3><p>MBlueGame Uygulamaları profesyonel bir geliştirme stüdyosudur. Tüm operasyonlar, fikri mülkiyetler ve dijital varlıklar münhasıran Onur Uslu'ya aittir ve onun tarafından yönetilmektedir.</p>`
            }
        };

        let currentLang = localStorage.getItem('mblue_lang') || 'en';

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('nav-home').innerText = t.navHome;
            document.getElementById('nav-about').innerText = t.navAbout;
            document.getElementById('nav-privacy').innerText = t.navPrivacy;
            document.querySelector('.lang-btn').innerText = t.btn;
            document.getElementById('title-main').innerHTML = t.title;
            document.getElementById('content').innerHTML = t.html;
            document.getElementById('footer-text').innerText = t.foot;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            localStorage.setItem('mblue_lang', currentLang);
            updateUI();
        }

        document.addEventListener("DOMContentLoaded", updateUI);
    </script>
</body>
</html>
